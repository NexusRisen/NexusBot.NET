name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore SysBot.NET.sln

    - name: Build and Publish
      run: |
        dotnet publish SysBot.Pokemon.WinForms/SysBot.Pokemon.WinForms.csproj -c Release -r win-${{ matrix.arch }} --self-contained false -p:PublishSingleFile=true -o ./publish/win-${{ matrix.arch }}

    - name: Zip Release
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/win-${{ matrix.arch }}/* -DestinationPath ./nexusbot-win-${{ matrix.arch }}.zip
        cp ./publish/win-${{ matrix.arch }}/nexusbot.exe ./nexusbot-${{ matrix.arch }}.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: nexusbot-win-${{ matrix.arch }}
        path: |
          ./nexusbot-win-${{ matrix.arch }}.zip
          ./nexusbot-${{ matrix.arch }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: NexusBot.NET ${{ github.ref_name }}
        body_path: release_notes.md
        files: |
          artifacts/nexusbot-win-x64/nexusbot-win-x64.zip
          artifacts/nexusbot-win-x86/nexusbot-win-x86.zip
          artifacts/nexusbot-win-x64/nexusbot-x64.exe
          artifacts/nexusbot-win-x86/nexusbot-x86.exe
        generate_release_notes: false
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
